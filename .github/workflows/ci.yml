name: Build

on:
  push:
    branches: [ main ]
    tags: [ "*" ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      MATRIX_OS: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: '3.10'
    - name: Install Python Dependencies
      run: pip install --upgrade meson ninja
    - if: matrix.os == 'ubuntu-latest'
      name: Install dependencies on Ubuntu
      run: |
        sudo apt-get update || true
        sudo apt-get install -y gtk-doc-tools
    - name: MSVC Setup
      if: matrix.os == 'windows-latest'
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
    - name: Meson Setup
      run: meson setup build $(test $MATRIX_OS = "ubuntu-latest" && echo "-Ddocs=true")
    - name: Build
      run: ninja -C build
    - name: Test
      run: ninja -C build test
    - name: Upload documentation
      if: matrix.os == 'ubuntu-latest' && github.ref_type == 'tag'
      uses: actions/upload-pages-artifact@v3
      with:
        path: build/docs/html
    - name: Create dist tarball
      if: matrix.os == 'ubuntu-latest' && github.ref_type == 'tag'
      run: meson dist -C build --no-tests
    - name: Upload dist tarball
      if: matrix.os == 'ubuntu-latest' && github.ref_type == 'tag'
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: build/meson-dist/raqm-*.tar.xz

  deploy-docs:
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

  release:
    if: github.ref_type == 'tag'
    needs: [build, build-sheenbidi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: dist
    - name: Create release
      env:
        GH_TOKEN: ${{ github.token }}
      run: >
        gh release create ${{ github.ref_name }}
        raqm-*.tar.xz
        --repo ${{ github.repository }}
        --generate-notes
        --title "Version ${GITHUB_REF_NAME#v}"

  build-sheenbidi:

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: '3.10'
    - name: Install Python Dependencies
      run: pip install --upgrade meson ninja
    - name: MSVC Setup
      if: matrix.os == 'windows-latest'
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
    - name: Meson Setup
      run: meson -Dsheenbidi=true build
    - name: Build
      run: ninja -C build
    - name: Test
      run: ninja -C build test
